<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarceLOJA - Sistema PDV</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
   VARIÁVEIS GLOBAIS E CONFIGURAÇÕES BASE
   ============================================================ */
:root {
    --primaria: #FFD700;        /* Amarelo Ouro - Destaque Principal */
    --primaria-dark: #E6C200;   /* Amarelo Escuro - Bordas e Hover */
    --secundaria: #1e272e;      /* Grafite Escuro - Textos e Cabeçalhos */
    --sucesso: #05c46b;         /* Verde - Finalização e Confirmação */
    --erro: #ff3f34;            /* Vermelho - Alertas e Exclusão */
    --info: #34e7e4;            /* Ciano - Informações Adicionais */
    --branco: #ffffff;
    --inter: 'Inter', sans-serif; /* Fonte Principal */
}

/* Reset de Margens e Box-sizing para evitar quebras de layout */
* { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
}

body {
    font-family: var(--inter);
    background: #a9c5e0;      /* Cor de fundo da página */
    display: flex;
    justify-content: center;  /* Centraliza o PDV horizontalmente */
    min-height: 100vh;
    padding: 20px;
}

/* Container Principal do PDV */
.container {
    width: 100%;
    max-width: 1100px;
    background: var(--branco);
    border-radius: 16px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.2); /* Sombra para profundidade */
    overflow: hidden;
}

/* ============================================================
   CABEÇALHO (HEADER)
   ============================================================ */
header {
    background: var(--primaria);
    padding: 20px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 4px solid var(--primaria-dark);
}

.logo-wrapper { font-size: 1.6rem; letter-spacing: -1px; color: var(--secundaria); }
.logo-main { font-weight: 300; }
.logo-sub { font-weight: 900; text-transform: uppercase; }

/* Badge de status no topo */
.header-status {
    font-size: 0.75rem;
    font-weight: 800;
    color: var(--secundaria);
    background: rgba(255,255,255,0.3);
    padding: 6px 15px;
    border-radius: 30px;
}

/* ============================================================
   LAYOUT GRID (Divisão de Telas)
   ============================================================ */
.grid { 
    display: grid; 
    grid-template-columns: 360px 1fr; /* Coluna fixa para inputs e flexível para itens */
    min-height: 600px; 
}

.painel-entrada { 
    padding: 30px; 
    border-right: 2px solid #f1f2f6; 
    background: #f9f9fb; 
}

.painel-carrinho { 
    padding: 30px; 
    display: flex; 
    flex-direction: column; 
}

h3 { 
    font-size: 0.85rem; 
    text-transform: uppercase; 
    color: #808e9b; 
    margin-bottom: 15px; 
}

/* Estilização de Inputs */
input {
    width: 100%; 
    padding: 14px; 
    margin-bottom: 15px;
    border: 2px solid #d2dae2; 
    border-radius: 10px; 
    font-size: 1rem;
}

input:focus { 
    border-color: var(--primaria-dark); 
    outline: none; 
    box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.1); 
}

/* Alinhamento de Quantidade e Preço lado a lado */
.input-group-row { 
    display: grid; 
    grid-template-columns: 1fr 90px; 
    gap: 12px; 
}

/* ============================================================
   COMPONENTES DE BOTÃO
   ============================================================ */
button { 
    border: none; 
    border-radius: 10px; 
    cursor: pointer; 
    font-weight: 700; 
    transition: 0.2s; 
}

button:active { 
    transform: translateY(2px); /* Efeito de clique físico */
}

.btn-adicionar { 
    background: var(--secundaria); 
    color: white; 
    width: 100%; 
    padding: 16px; 
    text-transform: uppercase; 
}

.btn-finalizar { 
    background: var(--sucesso); 
    color: white; 
    width: 100%; 
    padding: 22px; 
    font-size: 1.2rem; 
    margin-top: 15px;
    box-shadow: 0 6px 0 #059652; /* Sombra sólida para estilo 3D */
    text-transform: uppercase;
}

/* Botão de Limpar Carrinho */
#removeAll {
    background: none;
    border: 2px solid var(--erro);
    color: var(--erro);
    padding: 8px 15px;
    font-size: 0.75rem;
    letter-spacing: 1px;
    border-radius: 8px;
    margin-bottom: 10px;
    width: fit-content;
    align-self: flex-end; 
    text-transform: uppercase;
    transition: all 0.3s ease;
}

#removeAll:hover {
    background: var(--erro);
    color: white;
    box-shadow: 0 4px 12px rgba(255, 63, 52, 0.3);
    transform: translateY(-2px);
}

/* ============================================================
   LISTAGEM DE ITENS (CARRINHO)
   ============================================================ */
#lista { 
    flex-grow: 1; 
    overflow-y: auto; 
    max-height: 400px; 
    margin-bottom: 20px; 
}

.item {
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    padding: 15px; 
    background: #fff; 
    border: 2px solid transparent; /* Reserva espaço para o hover */
    border-radius: 12px; 
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
}

/* Feedback visual ao passar o mouse no item */
.item:hover {
    border-color: var(--primaria);
    background-color: #fffdf0;
    transform: translateX(5px); /* Desliza levemente para a direita */
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.item-info { display: flex; flex-direction: column; gap: 4px; }
.item-detalhes { font-size: 0.85rem; color: #636e72; display: flex; gap: 10px; }

/* Tag de Desconto ou Info no Item */
.tag-desc {
    background: #ffeaa7;
    color: #d63031;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: bold;
    margin-left: 8px;
}

/* Área do Totalizador */
#total-area {
    background: var(--secundaria); 
    color: white; 
    padding: 20px;
    border-radius: 15px; 
    text-align: right; 
    border-left: 8px solid var(--primaria);
}

/* ============================================================
   SISTEMA DE PAGAMENTO (UI CUSTOMIZADA)
   ============================================================ */
.painel-pagamento {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
}

.metodos-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
}

/* Esconde o Radio Button padrão */
.metodo-item input[type="radio"] {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
}

/* Estilização do Card de Pagamento */
.metodo-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 90px;
    cursor: pointer;
    background: #ffffff;
    border: 2px solid #d2dae2;
    border-radius: 12px;
    transition: all 0.25s ease;
    padding: 10px;
}

.metodo-card:hover {
    border-color: #b3bdc6;
    background-color: #fbfbfc;
    transform: translateY(-2px);
}

/* Estilo quando o método está SELECIONADO */
.metodo-item input[type="radio"]:checked + .metodo-card {
    border-color: #05c46b;
    background-color: #f0fff8;
    box-shadow: 0 5px 15px rgba(5, 196, 107, 0.15);
}

.metodo-card img { height: 30px; margin-bottom: 10px; object-fit: contain; }
.metodo-card span { font-size: 0.8rem; font-weight: 700; color: #4b4b4b; }

.metodo-item input[type="radio"]:checked + .metodo-card span {
    color: #05c46b;
}

/* ============================================================
   NOTIFICAÇÕES (TOASTS)
   ============================================================ */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }

.toast {
    background: white; 
    padding: 16px 25px; 
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
    margin-bottom: 10px;
    color: var(--secundaria); 
    font-weight: 700; 
    min-width: 250px;
    display: flex; 
    align-items: center; 
    gap: 12px;
    animation: slideIn 0.3s ease forwards; /* Animação de entrada */
}

@keyframes slideIn { 
    from { transform: translateX(120%); } 
    to { transform: translateX(0); } 
}

.toast.success { border-left: 6px solid var(--sucesso); }
.toast.error { border-left: 6px solid var(--erro); }
.toast.info { border-left: 6px solid var(--info); }

/* ============================================================
   MODAIS E POPUPS (DIALOG)
   ============================================================ */
dialog {
    border: none;
    border-radius: 20px;
    padding: 30px;
    width: 420px;
    margin: auto;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

/* Efeito de desfoque atrás do modal */
dialog::backdrop {
    background: rgba(30, 39, 46, 0.85);
    backdrop-filter: blur(6px);
}

.popup-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 20px;
}

/* Botões dentro do Modal */
.btn-confirm-pop {
    background: var(--sucesso);
    color: white;
    padding: 12px 25px;
    border-radius: 10px;
    flex: 1;
}

.btn-confirm-pop.danger { background: var(--erro); }

.btn-cancel-pop {
    background: #f1f2f6;
    color: #57606f;
    padding: 12px 25px;
    border-radius: 10px;
    flex: 1;
    border: 1px solid #d2dae2;
}

.input-pdv {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 2px solid #d2dae2;
    background: white;
    font-family: var(--inter);
    font-weight: 600;
}

#secao-pix img {
    border: 4px solid white;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* ============================================================
   AJUSTES PARA AS NOVAS FUNÇÕES (PAGAMENTO DINÂMICO)
   ============================================================ */

/* Garante que o seletor de parcelas e troco tenha espaçamento */
#detalhes-pagamento {
    transition: all 0.3s ease;
}

/* Estilização extra para os selects de Cartão e parcelas */
.input-pdv {
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
}

.input-pdv:focus {
    border-color: var(--primaria-dark);
    outline: none;
}

/* Estilo para o display de troco */
#display-troco {
    font-size: 1rem;
    padding: 5px;
    background: #f8f9fa;
    border-radius: 5px;
    text-align: center;
}

/* Ajuste do QR Code para não ficar gigante */
#secao-pix img {
    max-width: 130px;
    height: auto;
    display: block;
    margin: 10px auto;
    border: 4px solid white;
    border-radius: 12px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

/* Garante que o botão de finalizar tenha destaque total */
.btn-finalizar {
    display: block;
    margin-top: 20px;
    transition: filter 0.2s, transform 0.1s;
}

.btn-finalizar:hover {
    filter: brightness(1.1);
}

/* Estilos para os novos campos de pagamento */
.input-pdv {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 2px solid #d2dae2;
    background: white;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    margin-bottom: 10px;
}

#display-troco {
    text-align: center;
    padding: 8px;
    background: #f1f2f6;
    border-radius: 8px;
    font-size: 0.9rem;
}

#secao-pix img {
    max-width: 120px;
    margin: 10px auto;
    border: 3px solid white;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; }
.toast { background: white; padding: 15px 25px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); animation: slideIn 0.3s forwards; }
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
.toast.success { border-left: 5px solid #05c46b; }
.toast.error { border-left: 5px solid #ff3f34; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-wrapper">
                <span class="logo-main">Marce</span><span class="logo-sub">LOJA</span>
            </div>
            <div class="header-status">SISTEMA PDV • PROFESSIONAL</div>
        </header>

        <div class="grid">
            <div class="painel-entrada">
                <h3 id="titulo-form">Novo Produto</h3>
                <input id="nome" type="text" placeholder="Nome do Produto" autofocus />
                <div class="input-group-row">
                    <input id="preco" type="number" step="0.01" placeholder="Preço R$" />
                    <input id="quantidade" type="number" value="1" min="1" />
                </div>
                <input id="desconto" type="number" placeholder="Desconto %" />
                <button id="btn-acao" class="btn-adicionar" onclick="adicionar(event)">ADICIONAR (Enter)</button>
                <button id="btn-cancelar" onclick="cancelarEdicao()" style="display:none; margin-top:10px; width:100%; background:#636e72; color:white; padding:10px; border:none; border-radius:5px;">Cancelar Edição (Esc)</button>
                
                <h3 style="margin-top: 40px">🔍 Pesquisar</h3>
                <input id="busca" oninput="buscar()" placeholder="Filtrar itens..." />
                
                <h3 style="margin-top: 30px">📊 Relatórios</h3>
                <button class="btn-adicionar" style="background: var(--secundaria); color: var(--primaria);" onclick="window.open('historico/historico.html')">Ver Histórico de Vendas</button>
            </div>

            <div class="painel-carrinho">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>🛒 Carrinho de Compras</h3>
                    <button id="removeAll" onclick="removerTudo()" style="display: none;">ESVAZIAR CARRINHO</button>
                </div>

                <div id="lista" class="lista-container">
                    <p style="color:gray; text-align:center; margin-top:20px;">O carrinho está vazio.</p>
                </div>

                <div id="total-area">
                    <span style="font-size: 0.9rem; opacity: 0.8;">VALOR TOTAL A PAGAR</span>
                    <h2 style="margin: 5px 0 0 0;">R$ <span id="total">0.00</span></h2>
                </div>

                <div class="painel-pagamento">
                    <h3>MÉTODO DE PAGAMENTO</h3>
                    <div class="metodos-grid">
                        <label class="metodo-item">
                            <input type="radio" name="pagamento" value="Cartão" onclick="setPagamento(this.value)">
                            <div class="metodo-card">
                                <img src="Ícones/cartao.png" alt="Cartão">
                                <span>Cartão</span>
                            </div>
                        </label>
                        <label class="metodo-item">
                            <input type="radio" name="pagamento" value="Dinheiro" onclick="setPagamento(this.value)">
                            <div class="metodo-card">
                                <img src="Ícones/dinheiro.png" alt="Dinheiro">
                                <span>Dinheiro</span>
                            </div>
                        </label>
                        <label class="metodo-item">
                            <input type="radio" name="pagamento" value="Pix" onclick="setPagamento(this.value)">
                            <div class="metodo-card">
                                <img src="Ícones/pix.png" alt="Pix">
                                <span>Pix</span>
                            </div>
                        </label>
                    </div>

                    <div id="detalhes-pagamento" style="margin-top: 15px; min-height: 80px;">
                        <div id="secao-cartao" style="display: none;">
                            <select id="tipo-cartao" class="input-pdv" onchange="toggleParcelas()">
                                <option value="Crédito">Crédito</option>
                                <option value="Débito">Débito</option>
                            </select>
                            <div id="wrapper-parcelas" style="margin-top: 10px;">
                                <select id="parcelas" class="input-pdv">
                                    <option value="1">1x (À vista)</option>
                                    <option value="2">2x</option>
                                    <option value="3">3x</option>
                                </select>
                            </div>
                        </div>
                        <div id="secao-dinheiro" style="display: none;">
                            <input type="number" id="valor-pago" class="input-pdv" placeholder="Valor recebido" oninput="calcularTroco()">
                            <p id="display-troco" style="font-weight: bold; margin-top: 5px; color: var(--sucesso);">Troco: R$ 0.00</p>
                        </div>
                        <div id="secao-pix" style="display: none; text-align: center;">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://www.youtube.com/shorts/dQw4w9WgXcQ" alt="QR Pix">
                        </div>
                    </div>

                    <input type="hidden" id="formaPagamento" value="">
                    <button class="btn-finalizar" onclick="finalizar()" style="margin-top: 10px; width: 100%;">FINALIZAR VENDA (Enter)</button>
                </div>
            </div>
        </div>
    </div>

    <dialog id="modalConfirmacao">
        <div class="popup-content">
            <h2>Remover Item?</h2>
            <div class="popup-actions">
                <button id="btnConfirmarRemover" class="btn-confirm-pop danger">Remover</button>
                <button onclick="getEl('modalConfirmacao').close()" class="btn-cancel-pop">Cancelar</button>
            </div>
        </div>
    </dialog>

    <dialog id="CFPopup">
        <div class="popup-content">
            <span style="font-size: 50px;">✅</span>
            <h2>Venda Finalizada!</h2>
            <div class="popup-actions" style="flex-direction: column;"> 
                <a href="Recibo/recibo.html" target="_blank" class="btn-confirm-pop" style="text-decoration: none; width: 100%; text-align: center;">Imprimir Recibo (Enter)</a>
                <button id="closeButton" class="btn-cancel-pop">Nova Venda (Esc)</button>
            </div>
        </div>
    </dialog>

    <dialog id="removeAllPopup">
        <div class="popup-content">
            <h2>Esvaziar Carrinho?</h2>
            <div class="popup-actions">
                <button id="confirmRemoveAll" class="btn-confirm-pop danger">Sim, Esvaziar</button>
                <button onclick="getEl('removeAllPopup').close()" class="btn-cancel-pop">Cancelar</button>
            </div>
        </div>
    </dialog>

    <script
        /**
 * ============================================================
 * 1. ESTADO GLOBAL E UTILITÁRIOS
 * Aqui gerenciamos os dados que "vivem" na memória enquanto a
 * aba está aberta e atalhos para facilitar o código.
 * ============================================================
 */

// Recupera os dados do LocalStorage ou inicia um carrinho vazio
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let indexEdicao = null;       // Guarda a posição do item caso o usuário clique em "Editar"
let indexParaRemover = null;  // Armazena temporariamente o item que será excluído via modal
let editMode = false;         // Variável de controle: define se o botão principal Adiciona ou Salva Alteração

// Atalho para não precisar digitar 'document.getElementById' toda vez
const getEl = id => document.getElementById(id);

/**
 * ============================================================
 * 2. PERSISTÊNCIA E RENDERIZAÇÃO
 * Responsável por "salvar" os dados no navegador e atualizar
 * o que o usuário vê na tela (HTML).
 * ============================================================
 */

function salvarERenderizar() { 
    // Converte o array de objetos para String para salvar no navegador
    localStorage.setItem("carrinho", JSON.stringify(carrinho)); 
    render(); 
}

function render(listaParaExibir = carrinho) {
    const listaAlvo = getEl("lista");
    if (!listaAlvo) return;

    /**
     * LÓGICA DE CÁLCULO TOTAL (REDUCE)
     * Percorre o carrinho calculando: (Preço * Qtd) - Desconto
     */
    const somaTotal = carrinho.reduce((acc, item) => {
        const precoBase = item.precoUnitario * item.quantidade;
        return acc + (precoBase * (1 - item.desconto / 100));
    }, 0);

    // Mapeia o array JS para uma estrutura de HTML (Cards do Carrinho)
    const listaHtml = listaParaExibir.map((item) => {
        const precoBase = item.precoUnitario * item.quantidade;
        const totalItem = precoBase * (1 - item.desconto / 100);
        const indexReal = carrinho.indexOf(item); 

        return `
            <div class="item">
                <div class="item-info">
                    <strong>${item.quantidade}x ${item.nome}</strong>
                    <div class="item-detalhes">
                        <span>R$ ${item.precoUnitario.toFixed(2)}</span>
                        ${item.desconto > 0 ? `<span class="tag-desc">-${item.desconto}%</span>` : ''}
                    </div>
                </div>
                <div style="display:flex; align-items:center; gap:15px">
                    <span style="font-weight: 900; font-size: 1.1rem;">R$ ${totalItem.toFixed(2)}</span>
                    <button onclick="editar(${indexReal})" title="Editar" class="btn-icon">✏️</button>
                    <button onclick="remover(${indexReal})" title="Remover" class="btn-icon">🗑️</button>
                </div>
            </div>`;
    }).join("");

    // Insere o HTML gerado na tela ou mostra mensagem de vazio
    listaAlvo.innerHTML = listaHtml || "<p style='color:gray; text-align:center; padding:20px;'>Carrinho vazio.</p>";
    getEl("total").innerText = somaTotal.toFixed(2);
    
    // Controle de UI: Esconde o botão de "Esvaziar" se não houver itens
    getEl("removeAll").style.display = (carrinho.length >= 1) ? "block" : "none";
}

/**
 * ============================================================
 * 3. FILTRO DE BUSCA
 * Aplica um filtro no array de carrinho sem apagar os dados originais.
 * ============================================================
 */
function buscar() {
    const termo = getEl("busca").value.toLowerCase();
    const itensFiltrados = carrinho.filter(item => 
        item.nome.toLowerCase().includes(termo)
    );
    render(itensFiltrados); // Renderiza apenas o que bate com a pesquisa
}

/**
 * ============================================================
 * 4. GESTÃO DE PRODUTOS (ADICIONAR / EDITAR)
 * Aqui tratamos a entrada de dados e as regras de negócio.
 * ============================================================
 */
function adicionar(e) {
    if (e) e.preventDefault();
    
    // Tratamento de dados: primeira letra Maiúscula, troca vírgula por ponto
    let nome = getEl("nome").value.trim();
    nome = nome[0]?.toUpperCase() + nome.slice(1).toLowerCase();
    const preco = parseFloat(getEl("preco").value.replace(',', '.'));
    const desc = parseFloat(getEl("desconto").value) || 0;
    const qtd = parseInt(getEl("quantidade").value) || 1;

    // Validação de segurança
    if (nome.length < 2 || isNaN(preco) || preco <= 0) {
        return mostrarToast("Dados do produto inválidos!", "error");
    }

    const item = { nome, precoUnitario: preco, desconto: desc, quantidade: qtd };

    // Verifica se estamos salvando uma edição ou um novo produto
    if (editMode && indexEdicao !== null) {
        carrinho[indexEdicao] = item;
        mostrarToast("Item atualizado!");
        cancelarEdicao();
    } else {
        carrinho.push(item);
        mostrarToast(`${nome} adicionado!`);
    }

    salvarERenderizar();
    limparCampos();
}

function editar(i) {
    editMode = true;
    indexEdicao = i; 
    const it = carrinho[i];

    // Devolve os dados do item para os campos do formulário
    getEl("nome").value = it.nome; 
    getEl("preco").value = it.precoUnitario; 
    getEl("quantidade").value = it.quantidade; 
    getEl("desconto").value = it.desconto;
    
    // Mudança visual para indicar edição
    getEl("titulo-form").innerText = "✍️ Editando Item"; 
    getEl("btn-cancelar").style.display = "block";
    getEl("btn-acao").innerText = "SALVAR ALTERAÇÃO (Enter)";
    
    window.scrollTo({ top: 0, behavior: 'smooth' }); // Sobe a página para o formulário
    getEl("nome").focus();
}

function cancelarEdicao() {
    editMode = false;
    indexEdicao = null; 
    getEl("titulo-form").innerText = "Novo Produto"; 
    getEl("btn-cancelar").style.display = "none"; 
    getEl("btn-acao").innerText = "ADICIONAR (Enter)";
    limparCampos(); 
}

/**
 * ============================================================
 * 5. LÓGICA DE PAGAMENTO E FINALIZAÇÃO
 * Gerencia a troca de métodos de pagamento e finalização da venda.
 * ============================================================
 */

function setPagamento(valor) {
    getEl("formaPagamento").value = valor;
    // Exibe apenas os campos específicos do método escolhido
    getEl("secao-cartao").style.display = (valor === "Cartão") ? "block" : "none";
    getEl("secao-dinheiro").style.display = (valor === "Dinheiro") ? "block" : "none";
    getEl("secao-pix").style.display = (valor === "Pix") ? "block" : "none";
}

function toggleParcelas() {
    const tipo = getEl("tipo-cartao").value;
    const wrapper = getEl("wrapper-parcelas");
    // Se for Débito, esconde a opção de parcelas
    wrapper.style.display = (tipo === "Débito") ? "none" : "block";
    if(tipo === "Débito") getEl("parcelas").value = "1";
}

function calcularTroco() {
    const totalVenda = parseFloat(getEl("total").innerText);
    const pago = parseFloat(getEl("valor-pago").value) || 0;
    const troco = pago - totalVenda;
    const display = getEl("display-troco");
    
    if (troco >= 0) {
        display.innerText = `Troco: R$ ${troco.toFixed(2)}`;
        display.style.color = "#05c46b";
    } else {
        display.innerText = `Faltam: R$ ${Math.abs(troco).toFixed(2)}`;
        display.style.color = "#ff3f34";
    }
}

function finalizar() {
    const metodoBase = getEl("formaPagamento").value;
    const totalVenda = parseFloat(getEl("total").innerText);

    // Validações antes de encerrar
    if (carrinho.length === 0) return mostrarToast("Carrinho vazio!", "error");
    if (!metodoBase) return mostrarToast("Selecione o pagamento!", "info");

    let detalheFinal = metodoBase;

    // Constrói a string de detalhes para o histórico
    if (metodoBase === "Cartão") {
        const tipo = getEl("tipo-cartao").value;
        const parc = getEl("parcelas").value;
        detalheFinal = `Cartão ${tipo} (${parc}x)`;
    } else if (metodoBase === "Dinheiro") {
        const pago = parseFloat(getEl("valor-pago").value) || 0;
        if (pago < totalVenda) return mostrarToast("Valor insuficiente!", "error");
        detalheFinal = `Dinheiro (Pago: R$ ${pago.toFixed(2)})`;
    }

    // Objeto da Venda: O "coração" do relatório
    const venda = {
        id: Date.now(), // Gera um ID único baseado no tempo exato
        data: new Date().toLocaleString(),
        itens: [...carrinho],
        total: totalVenda,
        pagamento: detalheFinal
    };

    // Salva no histórico acumulado e na "última venda" (para o cupom fiscal)
    const historico = JSON.parse(localStorage.getItem("historico_vendas")) || [];
    historico.push(venda);
    localStorage.setItem("historico_vendas", JSON.stringify(historico));
    localStorage.setItem("ultima_venda", JSON.stringify(venda));

    getEl("CFPopup")?.showModal(); // Abre o modal de "Venda Realizada/Recibo"
}

/**
 * ============================================================
 * 6. AUXILIARES, MODAIS E TOASTS
 * Funções de suporte para interface e feedbacks.
 * ============================================================
 */

function limparCampos() { 
    ["nome", "preco", "desconto"].forEach(id => getEl(id).value = "");
    getEl("quantidade").value = "1"; 
    getEl("nome").focus(); 
}

function remover(i) { 
    indexParaRemover = i; 
    getEl("modalConfirmacao").showModal(); 
}

getEl("btnConfirmarRemover").onclick = () => {
    carrinho.splice(indexParaRemover, 1);
    salvarERenderizar();
    getEl("modalConfirmacao").close();
};

function removerTudo() {
    getEl("removeAllPopup").showModal();
    getEl("confirmRemoveAll").onclick = () => {
        carrinho.length = 0;
        salvarERenderizar();
        getEl("removeAllPopup").close();
    }
}

// Botão "Nova Venda": Limpa tudo para o próximo cliente
getEl("closeButton").onclick = () => { 
    carrinho = []; 
    salvarERenderizar();
    getEl("formaPagamento").value = "";
    document.querySelectorAll('input[name="pagamento"]').forEach(r => r.checked = false);
    getEl("CFPopup").close(); 
};

/**
 * SISTEMA DE TOASTS (NOTIFICAÇÕES FLUTUANTES)
 */
function mostrarToast(msg, tipo = 'success') {
    let container = getEl("toast-container") || document.createElement("div");
    if (!container.id) {
        container.id = "toast-container";
        container.className = "toast-container";
        document.body.appendChild(container);
    }
    const toast = document.createElement("div");
    toast.className = `toast ${tipo}`;
    toast.innerHTML = `<span>${msg}</span>`;
    container.appendChild(toast);
    
    // Remove o aviso automaticamente após 3 segundos
    setTimeout(() => { 
        toast.style.opacity = '0'; 
        setTimeout(() => toast.remove(), 500); 
    }, 3000);
}

/**
 * ============================================================
 * 7. SISTEMA DE ATALHOS DE TECLADO (UX Profissional)
 * Facilita o uso em balcão de vendas real.
 * ============================================================
 */
document.addEventListener("keydown", (e) => {
    const cf = getEl("CFPopup");
    const mc = getEl("modalConfirmacao");
    const ra = getEl("removeAllPopup");
    const estaDigitando = ["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName);

    // Atalho ENTER
    if (e.key === "Enter") {
        if (cf?.open) { 
            const link = cf.querySelector('a');
            if(link) window.open(link.href, '_blank'); 
            return;
        }
        if (mc?.open) { getEl("btnConfirmarRemover").click(); return; }
        if (ra?.open) { getEl("confirmRemoveAll").click(); return; }
        
        // Se estiver nos campos de produto, ADICIONA. Se não, FINALIZA a venda.
        if (estaDigitando && document.activeElement.id !== "valor-pago") {
            adicionar(e);
            return;
        }

        if (!cf?.open && carrinho.length > 0) {
            finalizar();
        }
    }

    // Atalho ESCAPE para cancelar/fechar modais
    if (e.key === "Escape") {
        if (mc?.open) mc.close();
        if (ra?.open) ra.close();
        if (cf?.open) getEl("closeButton").click();
        if (indexEdicao !== null) cancelarEdicao();
    }

    // Atalho DELETE para limpar carrinho (quando não estiver digitando em campos)
    if (e.key === "Delete" && !estaDigitando) {
        if (carrinho.length > 0) removerTudo();
    }
});

// Roda a renderização inicial ao carregar a página
document.addEventListener("DOMContentLoaded", render);
    ></script>
