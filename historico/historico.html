<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Vendas - MarceLOJA</title>
    
    <!-- REUTILIZAÇÃO DE ESTILOS
         Importamos o CSS principal (../test1.css) para manter a identidade visual 
         sem precisar escrever novos estilos do zero. -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <!-- CONTAINER DE HISTÓRICO
         Definimos um max-width menor (800px) para que a leitura dos cards de 
         venda seja mais confortável e focada. -->
    <div class="container" style="margin-top: 20px; max-width: 800px;">
        
        <header>
            <div class="logo-wrapper">
                <span class="logo-main">Marce</span><span class="logo-sub">LOJA</span>
            </div>
            <!-- Badge indicando que o usuário está no modo de consulta -->
            <div class="header-status">🕒 HISTÓRICO</div>
        </header>
        
        <!-- CORPO DO HISTÓRICO
             A classe 'historico-corpo' é o alvo onde o arquivo historico.js 
             irá "injetar" os cards de cada venda realizada. -->
        <main class="historico-corpo" style="padding: 20px;">
            
            <!-- Botão Voltar: Uma alternativa visual ao comando de teclado Esc -->
            <button onclick="window.close()" class="btn-secundario" style="margin-bottom: 20px; width: auto; padding: 10px 20px;">
                ← Voltar ao PDV (Esc)
            </button>

            <!-- Os cards de venda gerados pelo JS aparecerão abaixo deste comentário -->
        </main>
    </div>

    <!-- LÓGICA DE DADOS: Lê o LocalStorage e renderiza as vendas -->
    <script src="historico.js"></script>

    <!-- LÓGICA DE NAVEGAÇÃO RÁPIDA -->
    <script>
        /**
         * ESCAPE PARA O PDV
         * Como o histórico é uma página de consulta rápida, o atalho "Esc" 
         * permite que o operador retorne às vendas instantaneamente.
         */
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                window.location.href='../index.html';
            }
        });
    </script>
</body>
</html>
